version: "3.9"

networks:
  vault:
    name: ${VAULT_NET_NAME:-vault}
    ipam:
      config:
        - subnet: ${VAULT_SUBNET:-172.18.1.16/28}
          ip_range: ${VAULT_IP_RANGE:-172.18.1.16/28}
          gateway: ${VAULT_GATEWAY:-172.18.1.17}

services:
  vault:
    image: ${VAULT_IMAGE:-vault:1.11.11}
    container_name: ${VAULT_CONTAINER_NAME:-vault}
    networks:
      - vault
    cap_add:
      - IPC_LOCK
    ports:
      - "${VAULT_PORT:-8200}:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "${VAULT_DEV_ROOT_TOKEN_ID:-dev}"
      # Optional helpful envs for the dev image / CLI:
      VAULT_ADDR: "http://0.0.0.0:${VAULT_PORT}"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:${VAULT_PORT}"
    command: >
      server -dev
      -dev-root-token-id=${VAULT_DEV_ROOT_TOKEN_ID:-dev}
      -dev-listen-address=0.0.0.0:${VAULT_PORT}
    restart: unless-stopped
